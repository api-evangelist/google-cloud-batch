apis:
  - name: Google Cloud Batch API
    description: >-
      The Batch API enables programmatic management of batch jobs on Google Cloud,
      including creating, listing, and deleting jobs, monitoring task execution,
      and configuring compute resource allocation for batch workloads.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
